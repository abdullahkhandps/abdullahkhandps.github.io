<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Certifications | Abdullah Khan</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      background:#0f0f0f;
      color:white;
      font-family:'Orbitron', sans-serif;
    }

    .certificate-page{
      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:120px 20px;
    }

    .certificate-card{
      width:100%;
      max-width:900px;

      background:rgba(0,0,0,0.75);

      border:1px solid rgba(255,255,255,0.1);

      border-radius:18px;

      padding:30px;

      text-align:center;

      backdrop-filter:blur(10px);

      box-shadow:0 0 30px rgba(0,255,225,0.15);
    }

    .certificate-card h1{
      color:#00ffe1;

      margin-bottom:25px;
    }

    .certificate-image{
      width:100%;

      border-radius:12px;

      border:2px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

  <div class="certificate-page">

    <div class="certificate-card">

      <h1>My Trainee Certification</h1>

     <img src="trainee-certificate.jpg"
     alt="Trainee Certificate"
     class="certificate-image">

    </div>

  </div>

</body>
</html>
